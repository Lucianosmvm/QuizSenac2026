<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz da Turma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Paleta SENAC — azul */
    --senac-blue:#0a6bc4;
    --senac-blue-light:#2f9bef;
    --senac-blue-deep:#03325e;
    --bg-deep:#04203f;
    --bg-panel:#0a2f54;
    --bg-panel-alt:#103a64;
    --line:#1d527f;
    --text-primary:#f6f3ea;
    --text-muted:#9fc0dd;
    --success:#43c79b;
    --danger:#ff6b81;
    /* acentos juninos */
    --festa-gold:#ffcf3f;
    --festa-red:#ef5350;
    --festa-green:#4cc47a;
    --radius:16px;
    --radius-sm:10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% -10%, #0d4f8f 0%, transparent 55%),
      linear-gradient(180deg,#04203f 0%,#021a33 60%,#01101f 100%);
    background-attachment:fixed;
    color:var(--text-primary);
    font-family:'Work Sans',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* Céu estrelado + brilho da fogueira */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,0.9), transparent),
      radial-gradient(1.5px 1.5px at 28% 9%,  rgba(255,255,255,0.7), transparent),
      radial-gradient(1.5px 1.5px at 47% 22%, rgba(255,255,255,0.8), transparent),
      radial-gradient(1.5px 1.5px at 66% 7%,  rgba(255,255,255,0.6), transparent),
      radial-gradient(2px 2px   at 80% 16%,  rgba(255,255,255,0.9), transparent),
      radial-gradient(1.5px 1.5px at 92% 27%, rgba(255,255,255,0.7), transparent),
      radial-gradient(circle at 50% 108%, rgba(255,160,40,0.18), transparent 42%);
    pointer-events:none;
    z-index:0;
    animation:twinkle 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle{ from{opacity:.55;} to{opacity:1;} }

  /* ---------- Bandeirinhas (flag bunting) ---------- */
  .bunting{
    position:fixed;
    top:0; left:-2%;
    width:104%;
    height:42px;
    z-index:3;
    pointer-events:none;
    display:flex;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.35));
  }
  .bunting::before{
    content:"";
    position:absolute;
    top:9px; left:0; right:0;
    height:2px;
    background:rgba(255,255,255,.35);
    border-radius:2px;
  }
  .flag{
    flex:1 0 auto;
    height:30px;
    margin-top:8px;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;
    animation:flagwave 3.2s ease-in-out infinite;
  }
  @keyframes flagwave{
    0%,100%{ transform:rotate(-1.5deg); }
    50%{ transform:rotate(1.5deg); }
  }

  #app{
    position:relative;
    z-index:1;
    max-width:780px;
    margin:0 auto;
    padding:64px 20px 96px;
    perspective:1400px;
  }
  /* Transição de troca de tela */
  #app.screen-in{
    animation:screenIn .42s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes screenIn{
    from{ opacity:0; transform:translateY(18px) rotateX(7deg); }
    to{ opacity:1; transform:translateY(0) rotateX(0); }
  }

  h1,h2,h3{
    font-family:'Space Grotesk',sans-serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  .mono{
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.02em;
  }
  button{
    font-family:'Work Sans',sans-serif;
    cursor:pointer;
    border:none;
    background:none;
    color:inherit;
  }
  button:focus-visible,
  a:focus-visible{
    outline:2px solid var(--text-primary);
    outline-offset:3px;
  }

  /* ---------- Header ---------- */
  .top-bar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    margin-bottom:28px;
    flex-wrap:wrap;
  }
  .top-bar .eyebrow{
    font-size:12px;
    color:var(--festa-gold);
    text-transform:uppercase;
    letter-spacing:.18em;
  }
  .top-bar h1{
    font-size:34px;
    font-weight:700;
    background:linear-gradient(180deg,#ffffff 0%,var(--senac-blue-light) 90%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 2px 0 rgba(3,50,94,.35);
    transform:translateZ(40px);
  }
  .top-bar h1::after{
    content:" 🔥";
    -webkit-text-fill-color:initial;
    font-size:26px;
  }
  .reset-link{
    font-size:12px;
    color:var(--text-muted);
    text-decoration:underline;
    text-decoration-color:var(--line);
  }
  .reset-link:hover{ color:var(--text-primary); }
  .top-links{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }

  /* ---------- Name field (home) ---------- */
  .name-field{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:14px 16px;
    margin-bottom:22px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .name-field label{
    font-size:12px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .name-field input{
    background:var(--bg-panel-alt);
    border:1px solid var(--line);
    border-radius:7px;
    padding:13px 14px;
    font-size:16px;
    color:var(--text-primary);
    font-family:'Work Sans',sans-serif;
  }
  .name-field input:focus-visible{
    outline:2px solid var(--text-primary);
    outline-offset:1px;
  }
  .name-hint{
    font-size:12px;
    color:var(--text-muted);
    min-height:14px;
  }
  .name-hint.is-error{ color:var(--danger); }

  /* ---------- Ranking screen ---------- */
  .ranking-tabs{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin:18px 0 16px;
  }
  .rank-tab{
    --accent:#999;
    font-size:13px;
    font-weight:600;
    padding:10px 16px;
    border-radius:8px;
    border:1px solid var(--line);
    color:var(--text-muted);
  }
  .rank-tab:hover{ border-color:var(--accent); color:var(--text-primary); }
  .rank-tab.active{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--bg-deep);
  }
  .ranking-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .ranking-row{
    display:grid;
    grid-template-columns:26px 1fr auto auto;
    align-items:center;
    gap:12px;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:11px 14px;
    font-size:14px;
  }
  .rank-pos{ color:var(--text-muted); font-size:12px; }
  .rank-name{ font-weight:600; }
  .rank-detail{ color:var(--text-muted); font-size:12px; white-space:nowrap; }
  .rank-score{ font-size:13px; white-space:nowrap; }
  .ranking-empty{
    color:var(--text-muted);
    font-size:13.5px;
    padding:18px 4px;
  }
  .ranking-panel{
    margin-top:30px;
    padding-top:22px;
    border-top:1px solid var(--line);
  }
  .ranking-panel-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }
  .ranking-panel-head h2{
    font-size:18px;
    font-weight:600;
  }
  .ranking-panel-note{
    font-size:11px;
    color:var(--text-muted);
  }

  /* ---------- Boletim / category stamps (home) ---------- */
  .stamp-row{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin-top:8px;
  }
  @media (max-width:520px){
    .stamp-row{ grid-template-columns:1fr; }
  }
  .stamp{
    --accent: #999;
    position:relative;
    background:
      linear-gradient(160deg, rgba(255,255,255,.05), transparent 60%),
      var(--bg-panel);
    border:1px solid var(--line);
    border-top:3px solid var(--accent);
    border-radius:var(--radius-sm);
    padding:18px 16px 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
    transform-style:preserve-3d;
    transition:transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s ease, border-color .15s ease;
    box-shadow:0 10px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
    animation:cardPop .5s cubic-bezier(.2,.9,.25,1.15) both;
    animation-delay:var(--d,0s);
  }
  @keyframes cardPop{
    from{ opacity:0; transform:translateY(22px) rotateX(12deg) scale(.96); }
    to{ opacity:1; transform:none; }
  }
  /* faixa de bandeirinha mini no topo de cada carta */
  .stamp::after{
    content:"";
    position:absolute;
    top:-3px; left:10px; right:10px;
    height:7px;
    background:
      repeating-linear-gradient(90deg,
        var(--festa-gold) 0 8px, transparent 8px 9px,
        var(--festa-red) 9px 17px, transparent 17px 18px);
    opacity:.55;
    pointer-events:none;
  }
  .stamp:hover{
    transform:translateY(-6px) rotateX(6deg) rotateY(-4deg);
    box-shadow:0 22px 40px rgba(0,0,0,.5), 0 0 0 1px var(--accent);
    border-color:var(--accent);
  }
  .stamp-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .stamp-code{
    font-size:11px;
    color:var(--accent);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--line);
    border-radius:5px;
    padding:3px 7px;
  }
  .stamp-name{
    font-size:17px;
    font-weight:600;
    font-family:'Space Grotesk',sans-serif;
  }
  .stamp-score{
    font-size:12px;
    color:var(--text-muted);
  }
  .stamp-score b{ color:var(--text-primary); }
  .stamp-play{
    margin-top:auto;
    align-self:flex-start;
    font-size:14px;
    font-weight:700;
    color:#04203f;
    background:var(--accent);
    padding:11px 22px;
    border-radius:9px;
    box-shadow:0 4px 0 rgba(0,0,0,.35);
    transition:transform .1s ease, box-shadow .1s ease, filter .15s ease;
  }
  .stamp-play:hover{ filter:brightness(1.1); transform:translateY(-1px); }
  .stamp-play:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.35); }
  .stamp-play:disabled{
    opacity:0.4;
    cursor:not-allowed;
    filter:none;
  }
  .stamp-play:disabled:hover{ filter:none; }

  .home-footnote{
    margin-top:28px;
    font-size:12.5px;
    color:var(--text-muted);
    line-height:1.5;
  }

  /* ---------- Quiz screen ---------- */
  .quiz-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .quiz-cat{
    font-size:13px;
    font-weight:600;
    color:var(--accent);
  }
  .quiz-progress-label{
    font-size:12px;
    color:var(--text-muted);
  }
  .progress-track{
    height:6px;
    background:var(--bg-panel);
    border-radius:4px;
    overflow:hidden;
    margin-bottom:26px;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    transition:width .4s cubic-bezier(.2,.7,.2,1);
    background-image:linear-gradient(90deg, rgba(255,255,255,.45) 0 20%, transparent 20% 100%);
    background-size:40px 100%;
    animation:progShimmer 1s linear infinite;
  }
  @keyframes progShimmer{ from{background-position:0 0;} to{background-position:40px 0;} }

  .question-card{
    background:
      linear-gradient(160deg, rgba(255,255,255,.06), transparent 55%),
      var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px;
    box-shadow:0 18px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    transform-style:preserve-3d;
    animation:cardPop .45s cubic-bezier(.2,.9,.25,1.1) both;
  }
  .question-text{
    font-size:21px;
    font-weight:600;
    line-height:1.4;
    margin-bottom:18px;
  }
  .question-image-wrap{
    background:var(--bg-panel-alt);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:18px;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .question-image-wrap img{
    max-width:100%;
    max-height:240px;
    display:block;
    border-radius:6px;
  }
  .question-image-wrap svg{ max-height:160px; }

  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    display:flex;
    align-items:center;
    gap:12px;
    text-align:left;
    background:var(--bg-panel-alt);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:16px 16px;
    font-size:16px;
    transition:border-color .12s ease, background .12s ease, transform .12s ease, box-shadow .12s ease;
    animation:optIn .35s ease both;
    animation-delay:var(--d,0s);
  }
  @keyframes optIn{
    from{ opacity:0; transform:translateX(-14px); }
    to{ opacity:1; transform:none; }
  }
  .option:hover:not(:disabled){
    border-color:var(--accent);
    transform:translateX(4px);
    box-shadow:-4px 0 0 var(--accent);
  }
  .option-letter{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-muted);
    border:1px solid var(--line);
    border-radius:5px;
    width:22px;
    height:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .option.is-correct{
    border-color:var(--success);
    background:rgba(63,168,140,0.12);
  }
  .option.is-correct .option-letter{ border-color:var(--success); color:var(--success); }
  .option.is-wrong{
    border-color:var(--danger);
    background:rgba(224,97,126,0.12);
  }
  .option.is-wrong .option-letter{ border-color:var(--danger); color:var(--danger); }
  .option:disabled{ cursor:default; }

  .explanation{
    margin-top:16px;
    font-size:13.5px;
    color:var(--text-muted);
    line-height:1.5;
    border-top:1px solid var(--line);
    padding-top:14px;
  }

  .quiz-actions{
    display:flex;
    justify-content:flex-end;
    margin-top:20px;
  }
  .btn-primary{
    background:var(--accent);
    color:var(--bg-deep);
    font-weight:600;
    font-size:15px;
    padding:14px 26px;
    border-radius:9px;
  }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-primary:disabled{
    opacity:.35;
    cursor:not-allowed;
    filter:none;
  }
  .btn-ghost{
    border:1px solid var(--line);
    color:var(--text-primary);
    font-size:15px;
    padding:13px 20px;
    border-radius:9px;
  }
  .btn-ghost:hover{ border-color:var(--text-muted); }

  .back-link{
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:18px;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .back-link:hover{ color:var(--text-primary); }

  /* ---------- Result screen ---------- */
  .result-card{
    background:
      radial-gradient(circle at 50% 0%, rgba(255,207,63,.10), transparent 55%),
      var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:34px 26px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    transform-style:preserve-3d;
    animation:cardPop .5s cubic-bezier(.2,.9,.25,1.15) both;
  }
  .result-score{
    font-family:'Space Grotesk',sans-serif;
    font-size:64px;
    font-weight:700;
    color:var(--accent);
    line-height:1;
    text-shadow:0 4px 18px rgba(0,0,0,.4);
    transform:translateZ(50px);
    animation:scorePop .6s cubic-bezier(.2,.9,.25,1.3) both;
    animation-delay:.15s;
  }
  @keyframes scorePop{
    from{ opacity:0; transform:translateZ(50px) scale(.4); }
    to{ opacity:1; transform:translateZ(50px) scale(1); }
  }
  .result-sub{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--text-muted);
    margin-top:8px;
  }
  .result-msg{
    margin-top:14px;
    font-size:15px;
    color:var(--text-primary);
  }
  .result-actions{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:24px;
    flex-wrap:wrap;
  }
  .review-list{
    margin-top:28px;
    text-align:left;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .review-item{
    display:flex;
    gap:10px;
    font-size:13.5px;
    line-height:1.4;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    background:var(--bg-panel-alt);
  }
  .review-mark{
    flex-shrink:0;
    font-weight:700;
  }
  .review-mark.ok{ color:var(--success); }
  .review-mark.no{ color:var(--danger); }
</style>
</head>
<body>
<div class="bunting" aria-hidden="true"></div>
<div class="bonfire" aria-hidden="true">🔥</div>
<div id="app"></div>

<style>
  .bonfire{
    position:fixed;
    right:18px; bottom:14px;
    font-size:34px;
    z-index:2;
    pointer-events:none;
    filter:drop-shadow(0 0 14px rgba(255,150,40,.6));
    transform-origin:bottom center;
    animation:fire .9s ease-in-out infinite alternate;
  }
  @keyframes fire{
    from{ transform:scale(1) rotate(-3deg); }
    to{ transform:scale(1.12) rotate(3deg); }
  }
</style>

<!-- Dados separados: configuração, categorias e perguntas por matéria -->
<script src="data/config.js"></script>
<script src="data/questions/ingles.js"></script>
<script src="data/questions/php.js"></script>
<script src="data/questions/adm.js"></script>
<script src="data/questions/csharp.js"></script>
<script src="data/questions/bd.js"></script>
<script src="data/questions/libras.js"></script>
<script src="data/questions/index.js"></script>

<script>
/* =========================================================================
   CONFIGURAÇÃO RÁPIDA
   ========================================================================= */
// Quantas perguntas sortear por rodada de cada matéria (se a matéria tiver
// menos perguntas que esse número, usa todas as que existirem).




/* =========================================================================
   ARMAZENAMENTO (ranking salvo no navegador, por nome de jogador)
   Tenta usar localStorage; se não estiver disponível (ex.: numa pré-visualização
   restrita), usa um objeto em memória apenas para a sessão atual, sem quebrar o app.
   ========================================================================= */
const PLAYERS_KEY = 'quizTurma:players:v2';
const LAST_NAME_KEY = 'quizTurma:lastName:v2';
let memoryPlayers = {};
let memoryLastName = '';
let storageIsAvailable = true;

function loadPlayers(){
  try{
    const raw = localStorage.getItem(PLAYERS_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    storageIsAvailable = false;
    return memoryPlayers;
  }
}
function savePlayers(data){
  try{
    localStorage.setItem(PLAYERS_KEY, JSON.stringify(data));
  }catch(e){
    storageIsAvailable = false;
    memoryPlayers = data;
  }
}
function loadLastName(){
  try{
    return localStorage.getItem(LAST_NAME_KEY) || '';
  }catch(e){
    return memoryLastName;
  }
}
function saveLastName(name){
  try{
    localStorage.setItem(LAST_NAME_KEY, name);
  }catch(e){
    memoryLastName = name;
  }
}
function recordResult(name, categoryId, correct, total){
  const players = loadPlayers();
  const pct = Math.round((correct/total)*100);
  const playerData = players[name] || {};
  const prev = playerData[categoryId] || { best: 0, attempts: 0 };
  playerData[categoryId] = {
    best: Math.max(prev.best, pct),
    attempts: prev.attempts + 1,
    last: pct
  };
  players[name] = playerData;
  savePlayers(players);
}
function computeCategoryRanking(categoryId){
  const players = loadPlayers();
  return Object.keys(players)
    .filter(name => players[name][categoryId])
    .map(name => ({
      name,
      best: players[name][categoryId].best,
      attempts: players[name][categoryId].attempts
    }))
    .sort((a,b) => b.best - a.best || a.attempts - b.attempts);
}
function computeOverallRanking(){
  const players = loadPlayers();
  return Object.keys(players)
    .map(name => {
      const cats = players[name];
      const catIds = Object.keys(cats);
      const total = catIds.reduce((sum,id) => sum + cats[id].best, 0);
      const attempts = catIds.reduce((sum,id) => sum + cats[id].attempts, 0);
      return { name, total, subjectsPlayed: catIds.length, attempts };
    })
    .sort((a,b) => b.total - a.total || b.subjectsPlayed - a.subjectsPlayed);
}
function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* =========================================================================
   ESTADO / NAVEGAÇÃO
   ========================================================================= */
let state = { screen: 'home' };
let currentPlayerName = loadLastName();
let rankingTab = 'geral';

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(categoryId){
  const bank = QUESTIONS[categoryId] || [];
  const picked = shuffle(bank).slice(0, Math.min(QUESTIONS_PER_ROUND, bank.length));
  // embaralha também as opções de cada pergunta, mantendo o índice correto
  const rounds = picked.map(q => {
    const order = shuffle(q.options.map((opt, i) => i));
    return {
      q: q.q,
      image: q.image,
      explanation: q.explanation,
      options: order.map(i => q.options[i]),
      answerIndex: order.indexOf(q.answer)
    };
  });
  state = {
    screen: 'quiz',
    categoryId,
    rounds,
    current: 0,
    correctCount: 0,
    answered: false,
    selected: null,
    review: []
  };
  render();
}

function tryPlay(categoryId){
  const input = document.getElementById('player-name-input');
  const name = input ? input.value.trim() : currentPlayerName;
  const hint = document.getElementById('name-hint');
  if(!name){
    if(hint){ hint.textContent = 'Digite seu nome antes de jogar.'; hint.classList.add('is-error'); }
    if(input) input.focus();
    return;
  }
  if(hint){ hint.textContent = ''; hint.classList.remove('is-error'); }
  currentPlayerName = name;
  saveLastName(name);
  startQuiz(categoryId);
}

function goHome(){
  state = { screen: 'home' };
  render();
}

function setRankingTab(tab){
  rankingTab = tab;
  render();
}

function selectOption(idx){
  if(state.answered) return;
  const round = state.rounds[state.current];
  const isCorrect = idx === round.answerIndex;
  state.answered = true;
  state.selected = idx;
  if(isCorrect) state.correctCount++;
  state.review.push({
    q: round.q,
    correct: isCorrect,
    yourAnswer: round.options[idx],
    rightAnswer: round.options[round.answerIndex]
  });
  render();
}

function nextQuestion(){
  if(state.current + 1 < state.rounds.length){
    state.current++;
    state.answered = false;
    state.selected = null;
    render();
  }else{
    recordResult(currentPlayerName, state.categoryId, state.correctCount, state.rounds.length);
    state.screen = 'result';
    render();
  }
}

function clearAllScores(){
  if(!confirm('Tem certeza que deseja apagar todo o ranking salvo neste navegador? Isso afeta todos os nomes que já jogaram aqui.')) return;
  savePlayers({});
  goHome();
}

/* =========================================================================
   RENDER
   ========================================================================= */
function catById(id){ return CATEGORIES.find(c => c.id === id); }

function renderHome(){
  const hasName = !!currentPlayerName.trim();
  const cards = CATEGORIES.map((cat, i) => {
    return `
      <div class="stamp" style="--accent:${cat.color}; --d:${i*0.07}s">
        <div class="stamp-head">
          <span class="stamp-name">${cat.name}</span>
          <span class="stamp-code mono">${cat.code}</span>
        </div>
        <button class="stamp-play" data-action="play-home" data-cat="${cat.id}" ${hasName ? '' : 'disabled'}>Jogar</button>
      </div>`;
  }).join('');

  return `
    <div class="top-bar">
      <div>
        <div class="eyebrow mono">🎉 ARRAIÁ DO SENAC 🌽</div>
        <h1>Quiz</h1>
      </div>
      <div class="top-links">
        <button class="reset-link" data-action="reset">limpar ranking salvo</button>
      </div>
    </div>
    <div class="name-field">
      <label for="player-name-input">Quem vai jogar?</label>
      <input id="player-name-input" type="text" placeholder="Digite seu nome" maxlength="40" value="${escapeHtml(currentPlayerName)}">
      <span class="name-hint" id="name-hint"></span>
    </div>
    <div class="stamp-row">${cards}</div>
    ${renderRankingPanel(5)}
  `;
}

function renderRankingPanel(limit){
  const tabs = [{ id:'geral', label:'Geral', color:'#f2efe9' }]
    .concat(CATEGORIES.map(c => ({ id:c.id, label:c.code, color:c.color })));

  const tabsHtml = tabs.map(t => `
    <button class="rank-tab ${rankingTab === t.id ? 'active' : ''}" style="--accent:${t.color}" data-action="rank-tab" data-tab="${t.id}">${t.label}</button>
  `).join('');

  let listHtml;
  if(rankingTab === 'geral'){
    const rows = computeOverallRanking().slice(0, limit);
    listHtml = rows.length ? rows.map((r,i) => `
      <div class="ranking-row">
        <span class="rank-pos mono">${i+1}</span>
        <span class="rank-name">${escapeHtml(r.name)}</span>
        <span class="rank-detail mono">${r.subjectsPlayed} matéria${r.subjectsPlayed>1?'s':''}</span>
        <span class="rank-score mono">${r.total} pts</span>
      </div>
    `).join('') : `<div class="ranking-empty">Ninguém jogou ainda. Jogue uma matéria para aparecer aqui.</div>`;
  }else{
    const cat = catById(rankingTab);
    const rows = computeCategoryRanking(rankingTab).slice(0, limit);
    listHtml = rows.length ? rows.map((r,i) => `
      <div class="ranking-row">
        <span class="rank-pos mono">${i+1}</span>
        <span class="rank-name">${escapeHtml(r.name)}</span>
        <span class="rank-detail mono">${r.attempts} tentativa${r.attempts>1?'s':''}</span>
        <span class="rank-score mono">${r.best}%</span>
      </div>
    `).join('') : `<div class="ranking-empty">Ninguém jogou ${cat.name} ainda.</div>`;
  }

  return `
    <div class="ranking-panel">
      <div class="ranking-panel-head">
        <h2>Top 5</h2>
        <span class="ranking-panel-note mono">salvo neste navegador</span>
      </div>
      <div class="ranking-tabs">${tabsHtml}</div>
      <div class="ranking-list">${listHtml}</div>
    </div>
  `;
}

function renderQuiz(){
  const cat = catById(state.categoryId);
  const round = state.rounds[state.current];
  const total = state.rounds.length;

  let imageHtml = '';
  if(round.image){
    if(round.image.type === 'svg'){
      imageHtml = `<div class="question-image-wrap">${SVG_PLACEHOLDERS[round.image.value] || ''}</div>`;
    }else if(round.image.type === 'url'){
      imageHtml = `<div class="question-image-wrap"><img src="${round.image.value}" alt="Imagem da pergunta"></div>`;
    }
  }

  const optionsHtml = round.options.map((opt, idx) => {
    let cls = 'option';
    if(state.answered){
      if(idx === round.answerIndex) cls += ' is-correct';
      else if(idx === state.selected) cls += ' is-wrong';
    }
    return `
      <button class="${cls}" data-action="answer" data-idx="${idx}" style="--d:${idx*0.05}s" ${state.answered ? 'disabled' : ''}>
        <span class="option-letter">${String.fromCharCode(65+idx)}</span>
        <span>${opt}</span>
      </button>`;
  }).join('');

  const explanationHtml = (state.answered && round.explanation)
    ? `<div class="explanation">${round.explanation}</div>` : '';

  const isLast = state.current + 1 === total;

  return `
    <button class="back-link" data-action="home">← Voltar para o menu</button>
    <div class="quiz-header">
      <span class="quiz-cat" style="--accent:${cat.color}">${cat.name}</span>
      <span class="quiz-progress-label mono">Pergunta ${state.current+1} de ${total}</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="--accent:${cat.color}; background:${cat.color}; width:${((state.current)/total)*100}%"></div>
    </div>
    <div class="question-card" style="--accent:${cat.color}">
      <div class="question-text">${round.q}</div>
      ${imageHtml}
      <div class="options">${optionsHtml}</div>
      ${explanationHtml}
    </div>
    <div class="quiz-actions">
      <button class="btn-primary" style="--accent:${cat.color}; background:${cat.color}" data-action="next" ${state.answered ? '' : 'disabled'}>
        ${isLast ? 'Ver resultado' : 'Próxima'}
      </button>
    </div>
  `;
}

function renderResult(){
  const cat = catById(state.categoryId);
  const total = state.rounds.length;
  const pct = Math.round((state.correctCount/total)*100);
  let msg = 'Continue praticando!';
  if(pct === 100) msg = 'Perfeito! Você acertou tudo.';
  else if(pct >= 70) msg = 'Muito bom!';
  else if(pct >= 40) msg = 'Quase lá, vale revisar o conteúdo.';

  const reviewHtml = state.review.map(r => `
    <div class="review-item">
      <span class="review-mark ${r.correct ? 'ok' : 'no'}">${r.correct ? '✓' : '✕'}</span>
      <span>
        <strong>${r.q}</strong><br>
        ${r.correct ? `Resposta: ${r.yourAnswer}` : `Você respondeu: ${r.yourAnswer} — Correta: ${r.rightAnswer}`}
      </span>
    </div>
  `).join('');

  return `
    <button class="back-link" data-action="home">← Voltar para o menu</button>
    <div class="result-card" style="--accent:${cat.color}">
      <div class="eyebrow mono" style="color:${cat.color}">${cat.name.toUpperCase()}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-sub mono">${state.correctCount} de ${total} corretas</div>
      <div class="result-msg">${msg}</div>
      <div class="result-actions">
        <button class="btn-primary" style="background:${cat.color}" data-action="play-again" data-cat="${cat.id}">Jogar de novo</button>
        <button class="btn-ghost" data-action="home">Voltar para o menu</button>
      </div>
      <div class="review-list">${reviewHtml}</div>
    </div>
  `;
}

function render(){
  const app = document.getElementById('app');
  if(state.screen === 'home') app.innerHTML = renderHome();
  else if(state.screen === 'quiz') app.innerHTML = renderQuiz();
  else app.innerHTML = renderResult();
  // re-dispara a transição de troca de tela
  app.classList.remove('screen-in');
  void app.offsetWidth; // força reflow p/ reiniciar a animação
  app.classList.add('screen-in');
}

/* Monta as bandeirinhas no topo, alternando cores juninas */
(function buildBunting(){
  const el = document.querySelector('.bunting');
  if(!el) return;
  const cores = ['#ffcf3f','#ef5350','#4cc47a','#2f9bef','#ff8f3f','#c75fae'];
  let html = '';
  for(let i=0;i<24;i++){
    html += `<span class="flag" style="background:${cores[i%cores.length]}; animation-delay:${(i%6)*0.12}s"></span>`;
  }
  el.innerHTML = html;
})();

document.getElementById('app').addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  if(action === 'play-home') tryPlay(el.dataset.cat);
  else if(action === 'play-again') startQuiz(el.dataset.cat);
  else if(action === 'home') goHome();
  else if(action === 'rank-tab') setRankingTab(el.dataset.tab);
  else if(action === 'answer') selectOption(Number(el.dataset.idx));
  else if(action === 'next') nextQuestion();
  else if(action === 'reset') clearAllScores();
});

document.getElementById('app').addEventListener('input', (e) => {
  if(e.target && e.target.id === 'player-name-input'){
    const hint = document.getElementById('name-hint');
    const hasName = !!e.target.value.trim();
    if(hint && hint.classList.contains('is-error') && hasName){
      hint.textContent = '';
      hint.classList.remove('is-error');
    }
    document.querySelectorAll('.stamp-play').forEach(btn => {
      btn.disabled = !hasName;
    });
  }
});

document.getElementById('app').addEventListener('keydown', (e) => {
  if(e.target && e.target.id === 'player-name-input' && e.key === 'Enter'){
    e.preventDefault();
  }
});

render();
</script>
